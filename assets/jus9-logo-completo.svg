<svg width="1080" height="360" viewBox="0 0 1080 360" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
<title>Jus 9 Tecnologia Jurídica — símbolo completo</title>
<desc>Símbolo completo da Jus 9 com estrela de nove pontas, seta central, arcos desarmados em forma de 9 e 9 invertido, corda-balanca e wordmark.</desc>
<defs>
